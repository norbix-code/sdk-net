# Dependabot — keeps NuGet + GitHub Actions versions current.
# Security-patch PRs arrive out-of-band the moment a CVE is published.

version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Vilnius
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - nuget
    groups:
      nuget-minor-and-patch:
        update-types:
          - minor
          - patch
      microsoft-extensions:
        patterns:
          - 'Microsoft.Extensions.*'
      verify:
        patterns:
          - 'Verify.*'
      nunit:
        patterns:
          - 'NUnit*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Vilnius
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
